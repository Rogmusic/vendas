<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SamuelSports - Dashboard</title>
    <style>
        body {
            background-image: url("view-empty-soccer-stadium-with-fantasy-dreamy-sky.jpg");
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif;
        }
        h1 { font-weight: 900; margin: 40px 0; text-shadow: 0 4px 15px rgba(0,0,0,0.8); letter-spacing: 2px; }
        .main-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; width: 95%; max-width: 1200px; margin-bottom: 50px; }
        .iframe-card { flex: 1; min-width: 380px; height: 85vh; max-height: 800px; background: rgba(0,0,0,0.2); border-radius: 25px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        iframe { width: 100%; height: 100%; border: none; }
        
        @media (max-width: 800px) { .iframe-card { height: 750px; } }
    </style>
</head>
<body>
    <h1>SAMUELSPORTS DASHBOARD</h1>
    <div class="main-container">
        <!-- O Iframe puxa o arquivo local vendas.html -->
        <div class="iframe-card">
            <iframe src="vendas.html" allowtransparency="true"></iframe>
        </div>
    </div>
</body>
</html>
